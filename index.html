<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarePlate — Premium Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f4f1ea;
            --bg-2: #ebe6dc;
            --surface: rgba(255, 255, 255, 0.72);
            --surface-strong: rgba(255, 255, 255, 0.9);
            --surface-dark: #17342f;
            --surface-dark-2: #20463f;
            --text: #16312c;
            --muted: #6f7b77;
            --line: rgba(18, 44, 39, 0.08);
            --primary: #1b3c35;
            --primary-2: #28584e;
            --accent: #d8b75c;
            --accent-2: #f28b57;
            --success: #2e9a66;
            --danger: #ff6a5b;
            --info: #5a8dee;
            --shadow-xl: 0 40px 100px rgba(13, 33, 28, 0.12);
            --shadow-lg: 0 18px 40px rgba(16, 41, 36, 0.10);
            --shadow-md: 0 12px 30px rgba(16, 41, 36, 0.08);
            --radius-xxl: 34px;
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --mobile-width: 390px;
            --mobile-height: 844px;
            --transition: 280ms cubic-bezier(.2, .8, .2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        *::selection {
            background: rgba(216, 183, 92, 0.22);
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.9), transparent 28%),
                radial-gradient(circle at 85% 10%, rgba(216, 183, 92, 0.16), transparent 22%),
                radial-gradient(circle at 80% 80%, rgba(40, 88, 78, 0.12), transparent 24%),
                linear-gradient(160deg, #f7f3ec 0%, #eee8dc 52%, #e7e0d2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .stage {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 28px;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
        }

        .floating-panel {
            width: 300px;
            min-height: 520px;
            border-radius: 34px;
            background: rgba(255, 255, 255, 0.42);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: var(--shadow-xl);
            padding: 22px;
            display: none;
        }

        .floating-panel.visible-desktop {
            display: block;
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }

        .panel-sub {
            color: var(--muted);
            line-height: 1.5;
            font-size: 14px;
            margin-bottom: 22px;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 22px;
        }

        .chip {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(22, 49, 44, 0.06);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
        }

        .preview-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.6));
            border: 1px solid rgba(22, 49, 44, 0.06);
            border-radius: 26px;
            padding: 16px;
            box-shadow: var(--shadow-md);
            margin-bottom: 14px;
        }

        .preview-card h4 {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .preview-card p {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .device-shell {
            position: relative;
            width: calc(var(--mobile-width) + 38px);
            height: calc(var(--mobile-height) + 38px);
            border-radius: 58px;
            padding: 12px;
            background: linear-gradient(145deg, #1f1f1f, #050505 60%, #1e1e1e);
            box-shadow:
                0 20px 30px rgba(255, 255, 255, 0.15) inset,
                0 -10px 16px rgba(0, 0, 0, 0.2) inset,
                0 80px 120px rgba(0, 0, 0, 0.25);
        }

        .device-shell::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 148px;
            height: 32px;
            background: #090909;
            border-radius: 0 0 22px 22px;
            z-index: 6;
        }

        .device {
            position: relative;
            width: var(--mobile-width);
            height: var(--mobile-height);
            border-radius: 46px;
            overflow: hidden;
            background:
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.9), transparent 28%),
                linear-gradient(180deg, #fcfaf5 0%, #f4f0e7 100%);
        }

        .ambient-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 15% 15%, rgba(216, 183, 92, 0.12), transparent 16%),
                radial-gradient(circle at 90% 8%, rgba(40, 88, 78, 0.16), transparent 18%),
                radial-gradient(circle at 80% 88%, rgba(242, 139, 87, 0.10), transparent 20%);
            z-index: 0;
        }

        .status-bar {
            position: relative;
            z-index: 5;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 22px 0 24px;
            font-size: 14px;
            font-weight: 700;
            color: #0f221e;
        }

        .status-icons {
            display: flex;
            gap: 7px;
            align-items: center;
            opacity: 0.86;
        }

        .status-pill {
            width: 18px;
            height: 10px;
            border: 1.8px solid currentColor;
            border-radius: 3px;
            position: relative;
        }

        .status-pill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 10px;
            height: 4px;
            border-radius: 1px;
            background: currentColor;
        }

        #app {
            position: relative;
            z-index: 2;
            height: calc(100% - 54px);
            overflow: hidden;
        }

        .screen {
            height: 100%;
            overflow-y: auto;
            padding: 6px 18px 132px;
            scrollbar-width: none;
            animation: fadeUp 420ms var(--transition);
        }

        .screen::-webkit-scrollbar {
            display: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hero {
            position: relative;
            padding: 12px 4px 18px;
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: rgba(22, 49, 44, 0.52);
            margin-bottom: 10px;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.045em;
        }

        .hero h1 {
            font-size: 34px;
            line-height: 0.95;
            max-width: 210px;
        }

        .hero p {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
            max-width: 250px;
        }

        .avatar-cluster {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(22, 49, 44, 0.06);
            backdrop-filter: blur(16px);
            border-radius: 999px;
            padding: 6px 8px 6px 6px;
            box-shadow: var(--shadow-md);
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            font-size: 14px;
        }

        .avatar-meta {
            padding-right: 4px;
        }

        .avatar-meta strong {
            display: block;
            font-size: 12px;
            line-height: 1;
        }

        .avatar-meta span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .glass-card,
        .tile,
        .meal-card,
        .care-card,
        .list-card,
        .modal-sheet,
        .planner-card,
        .panel-card {
            border: 1px solid rgba(22, 49, 44, 0.06);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.68));
            backdrop-filter: blur(18px);
        }

        .featured {
            position: relative;
            margin-top: 18px;
            min-height: 250px;
            border-radius: 32px;
            padding: 18px;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(13, 26, 24, 0.04), rgba(13, 26, 24, 0.12)),
                linear-gradient(160deg, #20463f 0%, #17342f 68%, #102621 100%);
            color: white;
            box-shadow: 0 26px 50px rgba(23, 52, 47, 0.30);
        }

        .featured::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 90% 15%, rgba(216, 183, 92, 0.26), transparent 18%),
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.12), transparent 18%);
            pointer-events: none;
        }

        .featured-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .featured-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .featured-image {
            position: absolute;
            right: -10px;
            bottom: -18px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 40%, #fff6dc 0%, #ecd596 28%, #d29b61 47%, #7a4028 67%, #3f241f 100%);
            box-shadow:
                inset 0 12px 18px rgba(255, 255, 255, 0.25),
                inset 0 -24px 34px rgba(0, 0, 0, 0.22),
                0 20px 50px rgba(0, 0, 0, 0.30);
            border: 8px solid rgba(255, 255, 255, 0.08);
            opacity: 0.98;
        }

        .featured-garnish,
        .featured-garnish::before,
        .featured-garnish::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            background: rgba(118, 186, 89, 0.82);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.14);
        }

        .featured-garnish {
            width: 32px;
            height: 12px;
            right: 82px;
            bottom: 90px;
            transform: rotate(36deg);
        }

        .featured-garnish::before {
            width: 26px;
            height: 10px;
            right: 36px;
            top: 22px;
            transform: rotate(-22deg);
        }

        .featured-garnish::after {
            width: 22px;
            height: 9px;
            left: -40px;
            top: -18px;
            transform: rotate(18deg);
        }

        .featured-content {
            position: relative;
            z-index: 1;
            margin-top: 26px;
            max-width: 195px;
        }

        .featured-content h2 {
            font-size: 29px;
            line-height: 0.95;
            margin-top: 10px;
        }

        .featured-content p {
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }

        .featured-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .meta-pill {
            padding: 9px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 12px;
            font-weight: 700;
        }

        .bento {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-top: 16px;
        }

        .tile {
            border-radius: 26px;
            padding: 16px;
            min-height: 112px;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
        }

        .tile:active,
        .interactive:active {
            transform: scale(0.98);
        }

        .tile:hover,
        .meal-card:hover,
        .care-card:hover,
        .interactive:hover {
            border-color: rgba(27, 60, 53, 0.11);
            box-shadow: 0 18px 34px rgba(16, 41, 36, 0.12);
        }

        .col-2 {
            grid-column: span 2;
        }

        .col-4 {
            grid-column: span 4;
        }

        .row-2 {
            grid-row: span 2;
        }

        .tile-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: rgba(22, 49, 44, 0.48);
            margin-bottom: 8px;
        }

        .tile-value {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            line-height: .95;
            letter-spacing: -.05em;
        }

        .tile-sub {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.45;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .macro-rings {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .ring {
            width: 58px;
            text-align: center;
        }

        .ring svg {
            width: 58px;
            height: 58px;
            transform: rotate(-90deg);
            overflow: visible;
        }

        .ring circle.bg {
            fill: none;
            stroke: rgba(22, 49, 44, 0.08);
            stroke-width: 6;
        }

        .ring circle.bar {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset .6s ease;
        }

        .ring-label {
            margin-top: -40px;
            display: block;
            font-size: 11px;
            font-weight: 800;
            position: relative;
        }

        .ring-per {
            display: block;
            margin-top: 18px;
            font-size: 10px;
            color: var(--muted);
            font-weight: 700;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 26px 2px 14px;
        }

        .section-head h3 {
            font-size: 22px;
        }

        .ghost-btn,
        .primary-btn,
        .soft-btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            transition: transform var(--transition), background var(--transition), color var(--transition), box-shadow var(--transition);
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(22, 49, 44, 0.06);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 999px;
            font-size: 12px;
            box-shadow: var(--shadow-md);
        }

        .soft-btn {
            background: rgba(27, 60, 53, 0.06);
            color: var(--primary);
            padding: 12px 14px;
            border-radius: 16px;
            font-size: 12px;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            padding: 16px 18px;
            border-radius: 18px;
            box-shadow: 0 18px 28px rgba(27, 60, 53, 0.2);
            font-size: 14px;
            width: 100%;
        }

        .ghost-btn:hover,
        .primary-btn:hover,
        .soft-btn:hover {
            transform: translateY(-1px);
        }

        .meal-list,
        .care-list,
        .grocery-list,
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .meal-card,
        .care-card,
        .list-card,
        .planner-card {
            border-radius: 24px;
            padding: 14px;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
        }

        .meal-card {
            display: grid;
            grid-template-columns: 92px 1fr;
            gap: 14px;
            align-items: center;
            cursor: pointer;
        }

        .meal-visual {
            width: 92px;
            height: 92px;
            border-radius: 22px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #f3ead1, #d9c4a7);
            box-shadow: inset 0 12px 18px rgba(255, 255, 255, 0.2);
        }

        .meal-bowl {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 35%, #fff3d5 0%, #f2cf89 28%, #b3663a 48%, #63341f 72%, #4a2519 100%);
            box-shadow:
                inset 0 10px 14px rgba(255, 255, 255, 0.24),
                inset 0 -16px 20px rgba(0, 0, 0, 0.18),
                0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .meal-bowl::before,
        .meal-bowl::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            background: #7abd56;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
        }

        .meal-bowl::before {
            width: 18px;
            height: 8px;
            top: 24px;
            left: 18px;
            transform: rotate(22deg);
        }

        .meal-bowl::after {
            width: 14px;
            height: 7px;
            top: 42px;
            right: 18px;
            transform: rotate(-18deg);
        }

        .meal-icon {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 34px;
        }

        .meal-topline {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
        }

        .meal-type {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: rgba(22, 49, 44, 0.45);
        }

        .score-pill {
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(46, 154, 102, 0.12);
            color: var(--success);
            font-size: 11px;
            font-weight: 800;
        }

        .meal-card h4 {
            font-size: 18px;
            margin-top: 8px;
            line-height: 1.02;
        }

        .meal-card p {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
        }

        .meal-foot {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tiny-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(27, 60, 53, 0.05);
            color: var(--text);
        }

        .week-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 8px 0 4px;
            margin-top: 10px;
        }

        .week-strip::-webkit-scrollbar {
            display: none;
        }

        .day-tab {
            min-width: 72px;
            padding: 14px 12px;
            border-radius: 22px;
            border: 1px solid rgba(22, 49, 44, 0.06);
            background: rgba(255, 255, 255, 0.75);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .day-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 18px 28px rgba(27, 60, 53, 0.24);
        }

        .day-tab .day {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .day-tab .num {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            line-height: 1;
        }

        .planner-summary {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .planner-chip {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(22, 49, 44, 0.06);
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .planner-chip strong {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            letter-spacing: -.04em;
        }

        .planner-chip span {
            display: block;
            margin-top: 4px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: rgba(22, 49, 44, 0.45);
        }

        .toggle-row {
            display: flex;
            gap: 10px;
            margin: 10px 0 16px;
        }

        .toggle {
            flex: 1;
            border: 1px solid rgba(22, 49, 44, 0.06);
            background: rgba(255, 255, 255, 0.8);
            border-radius: 18px;
            padding: 12px 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        .toggle.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
        }

        .list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(22, 49, 44, 0.06);
        }

        .list-row:last-child {

        function saveSpecialistProfile() {
            state.specialistProfile.name = document.getElementById('spName')?.value?.trim() || state.specialistProfile.name;
            state.specialistProfile.credentials = document.getElementById('spCredentials')?.value?.trim() || state.specialistProfile.credentials;

            state.specialistProfile.specialties = specialties.split(',').map(item => item.trim()).filter(Boolean);
            state.specialistProfile.highlight = `Specialties updated: ${state.specialistProfile.specialties.join(', ') || 'General nutrition support'}`;
            closeModal();
            render();
        }

        function saveSpecialistAvailability() {
            state.specialistProfile.availability = document.getElementById('spAvailability')?.value?.trim() || state.specialistProfile.availability;
            state.specialistProfile.responseTarget = document.getElementById('spResponseTarget')?.value?.trim() || state.specialistProfile.responseTarget;
            state.specialistProfile.note = `Availability updated to ${state.specialistProfile.availability}`;
            closeModal();
            render();
        }

        function sendSpecialistRecommendation(clientId) {
            const client = getSpecialistClient(clientId);
            const message = document.getElementById('spMessage')?.value?.trim();
            if (!message) return;
            state.specialistDraftMessage = message;
            client.nextStep = 'Recommendation sent to patient';
            state.specialistProfile.consults = Math.max(0, state.specialistProfile.consults - 1);
            state.specialistProfile.highlight = `Recommendation sent to ${client.name}`;
            closeModal();
            render();
        }

        function saveSpecialistPlan(clientId) {
            const client = getSpecialistClient(clientId);
            const plan = document.getElementById('spPlanUpdate')?.value?.trim();
            const nextStep = document.getElementById('spNextStep')?.value?.trim();
            if (plan) client.plan = plan;
            if (nextStep) client.nextStep = nextStep;
            state.specialistProfile.planEdits += 1;
            state.specialistProfile.highlight = `Plan updated for ${client.name}`;
            closeModal();
            render();
        }

        function completeSpecialistTask(index) {
            const task = state.specialistActivity[index];
            if (!task) return;
            state.specialistActivity[index] = {
                ...task,
                task: `${task.task} (done)`
            };
            state.specialistProfile.highlight = `Completed ${task.time} workflow task`;
            render();
        }

        function render() {
            renderRoleSwitch();
            renderNav();
            renderGuidePanel();

            if (state.onboardingMode) {
                app.innerHTML = renderOnboarding();
                return;
            }

            if (state.role === 'specialist') {
                app.innerHTML = renderDietitianPortal();
                return;
            }

            if (state.role === 'admin') {
                app.innerHTML = renderAdminPortal();
                return;
            }

            switch (state.currentScreen) {
                case 'planner':
                    app.innerHTML = renderPlanner();
                    break;
                case 'grocery':
                    app.innerHTML = renderGrocery();
                    break;
                case 'specialists':
                    app.innerHTML = renderSpecialists();
                    break;
                case 'profile':
                    app.innerHTML = renderProfile();
                    break;
                case 'chat':
                    app.innerHTML = renderChat();
                    break;
                case 'home':
                default:
                    app.innerHTML = renderHome();
            }
        }

        function navigateTo(screen) {
            state.currentScreen = screen;
            state.onboardingMode = false;
            render();
        }

        function navigateRoleScreen(role, screen) {
            if (role === 'specialist') state.specialistScreen = screen;
            if (role === 'admin') state.adminScreen = screen;
            render();
        }

        function switchRole(role) {
            state.role = role;
            state.onboardingMode = false;
            if (role === 'user') state.currentScreen = 'home';
            if (role === 'specialist' && !state.specialistScreen) state.specialistScreen = 'dashboard';
            if (role === 'admin' && !state.adminScreen) state.adminScreen = 'overview';
            render();
        }

        function selectDay(index) {
            state.selectedDay = index;
            render();
        }

        function setPlannerView(view) {
            state.plannerView = view;
            render();
        }

        function toggleOnboarding(force = null) {
            state.onboardingMode = typeof force === 'boolean' ? force : !state.onboardingMode;
            render();
        }

        function nextOnboarding() {
            if (state.onboardingStep === 0) {
                state.name = document.getElementById('obName')?.value?.trim() || 'Ella';
            }
            if (state.onboardingStep === 1) {
                state.medicalProfile.condition = document.getElementById('obCondition')?.value || 'Diabetes';
                const meds = document.getElementById('obMeds')?.value || '';
                state.medicalProfile.medications = meds.split(',').map(s => s.trim()).filter(Boolean);
            }
            if (state.onboardingStep === 2) {
                state.medicalProfile.cuisine = document.getElementById('obCuisine')?.value || 'Nigerian';
                state.onboardingMode = false;
                state.currentScreen = 'home';
                state.selectedDay = 0;
                render();
                return;
            }
            state.onboardingStep += 1;
            render();
        }

        function openMeal(mealName) {
            let found = null;
            getPlan().forEach(day => {
                day.meals.forEach(meal => {
                    if (meal.name === mealName) found = meal;
                });
            });
            if (!found) return;

            mealModal.innerHTML = `
        <div class="modal-sheet">
          <div class="sheet-handle"></div>
          <div class="sheet-hero">
            <div class="sheet-bowl">${found.img ? `<img src="${found.img}" alt="${found.name}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">` : `<div class="meal-bowl"></div>`}</div>
            <div>
              <div class="tile-label">Detailed nutrition</div>
              <h2 style="font-size: 30px; line-height: .95;">${found.name}</h2>
              <p class="tile-sub" style="margin-top: 8px;">${found.desc}</p>
            </div>
          </div>
          <div class="metric-grid">
            <div class="metric"><strong>${found.macros.protein}g</strong><span>Protein</span></div>
            <div class="metric"><strong>${found.macros.carbs}g</strong><span>Carbs</span></div>
            <div class="metric"><strong>${found.macros.fats}g</strong><span>Fats</span></div>
          </div>
          <div class="list-card" style="border-radius: 22px; padding: 16px;">
            <div class="tile-label">Calorie profile</div>
            <h3 style="font-size: 24px;">${found.macros.kcal} kcal</h3>
            <p class="tile-sub">Designed to support ${state.medicalProfile.condition.toLowerCase()} management while preserving cultural familiarity.</p>
          </div>
          <div style="margin-top: 16px;">
            <div class="tile-label">Core ingredients</div>
            <div class="ingredients">
              ${found.ingredients.map(item => `<span class="ingredient-pill">${item}</span>`).join('')}
            </div>
          </div>
          <div style="margin-top: 20px; display:flex; gap:10px;">
            <button class="primary-btn" onclick="closeMealModal()">Done</button>
          </div>
        </div>
      `;
            mealModal.classList.add('show');
        }

        function closeMealModal() {
            closeModal();
        }

        mealModal.addEventListener('click', (e) => {
            if (e.target === mealModal) closeModal();
        });

        function toggleGrocery(item) {
            state.groceryChecked[item] = !state.groceryChecked[item];
            render();
        }

        function checkAllGroceries() {
            const items = groceryTemplates[state.medicalProfile.cuisine] || [];
            items.forEach(item => state.groceryChecked[item] = true);
            render();
        }

        function simulateOrder() {
            alert('Prototype action: Grocery partner checkout opened.');
        }

        function simulateChat(name) {
            state.chatWith = specialistData.find(p => p.name === name) || specialistData[0];
            state.chatMessages = [
                { from: 'them', text: `Hi ${state.name}, I've reviewed your recent meal logs and glucose data. Everything looks encouraging.`, time: '2:14 PM' },
                { from: 'them', text: 'I noticed your sodium was slightly elevated on Tuesday. Could you try swapping the Ofada rice portion for a lighter option?', time: '2:15 PM' },
                { from: 'me', text: 'Thanks for flagging that. I\'ll try the cauliflower rice option instead.', time: '2:22 PM' },
                { from: 'them', text: 'Perfect. I\'ve adjusted your Thursday plan accordingly. Keep up the great work! 💪', time: '2:23 PM' },
            ];
            state.currentScreen = 'chat';
            render();
        }

        function renderChat() {
            const person = state.chatWith || specialistData[0];
            return `
        <div class="screen" style="padding: 0; display: flex; flex-direction: column; height: 100%;">
          <div style="padding: 16px 18px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(22,49,44,0.06); background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);">
            <div style="width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.5;" onclick="navigateTo('specialists')">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="care-avatar" style="width: 40px; height: 40px; font-size: 14px;">${person.initials}</div>
            <div style="flex: 1;">
              <h4 style="font-size: 16px;">${person.name}</h4>
              <p style="font-size: 11px; color: var(--muted);">${person.title} · ${person.online ? '<span style="color: var(--success);">Online</span>' : 'Offline'}</p>
            </div>
          </div>

          <div style="flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none;">
            ${(state.chatMessages || []).map(msg => `
              <div style="display: flex; justify-content: ${msg.from === 'me' ? 'flex-end' : 'flex-start'};">
                <div style="
                  max-width: 78%;
                  padding: 12px 16px;
                  border-radius: ${msg.from === 'me' ? '20px 20px 4px 20px' : '20px 20px 20px 4px'};
                  background: ${msg.from === 'me' ? 'linear-gradient(135deg, var(--primary), var(--primary-2))' : 'rgba(22,49,44,0.05)'};
                  color: ${msg.from === 'me' ? 'white' : 'var(--text)'};
                  font-size: 14px;
                  line-height: 1.5;
                ">
                  <div>${msg.text}</div>
                  <div style="font-size: 10px; opacity: 0.5; margin-top: 6px; text-align: ${msg.from === 'me' ? 'right' : 'left'};">${msg.time}</div>
                </div>
              </div>
            `).join('')}
          </div>

          <div style="padding: 12px 18px 24px; border-top: 1px solid rgba(22,49,44,0.06); background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);">
            <div style="display: flex; gap: 10px; align-items: center;">
              <input id="chatInput" type="text" placeholder="Type a message..." style="
                flex: 1; border: 1px solid rgba(22,49,44,0.08); background: rgba(22,49,44,0.03);
                border-radius: 999px; padding: 14px 18px; font-size: 14px; font-family: inherit; outline: none;
              " onkeypress="if(event.key==='Enter')sendChatMessage()">
              <button onclick="sendChatMessage()" style="
                width: 48px; height: 48px; border-radius: 50%; border: none;
                background: linear-gradient(135deg, var(--primary), var(--primary-2));
                color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
                box-shadow: 0 8px 20px rgba(27,60,53,0.25);
              ">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              </button>
            </div>
          </div>
        </div>
      `;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            if (!input || !input.value.trim()) return;
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            state.chatMessages.push({ from: 'me', text: input.value.trim(), time: timeStr });
            render();
            setTimeout(() => {
                const replies = [
                    'I\'ll review that and update your plan accordingly.',
                    'Great observation. Let me check your recent data.',
                    'That\'s a positive change. Keep it up! 🎯',
                    'I\'ve noted this. We\'ll discuss at your next check-in.',
                    'Your glucose trends support this approach. Well done.'
                ];
                const now2 = new Date();
                state.chatMessages.push({ from: 'them', text: replies[Math.floor(Math.random() * replies.length)], time: now2.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) });
                render();
            }, 1200 + Math.random() * 800);
        }

        function resetPrototype() {
            state.name = 'Ella';
            state.role = 'user';
            state.currentScreen = 'home';
            state.onboardingStep = 0;
            state.onboardingMode = false;
            state.selectedDay = 0;
            state.plannerView = 'meals';
            state.groceryChecked = {};
            state.medicalProfile = {
                condition: 'Diabetes',
                medications: ['Metformin'],
                cuisine: 'Nigerian',
                allergies: []
            };
            closeMealModal();
            render();
        }

        render();

        // --- LIVE STAT ANIMATION ---
        setInterval(() => {
            if (state.currentScreen !== 'home' || state.onboardingMode || state.role !== 'user') return;
            // Simulate live fluctuations
            state._liveBloodSugar = Math.round(108 + Math.random() * 14);
            state._liveSteps = (state._liveSteps || 4200) + Math.round(Math.random() * 30);
            state._liveWater = Math.min(2.5, (state._liveWater || 1.8) + (Math.random() > 0.7 ? 0.1 : 0));
            state._liveWater = Math.round(state._liveWater * 10) / 10;
            state._liveAdherence = Math.max(88, Math.min(97, 92 + Math.round((Math.random() - 0.4) * 4)));
            // Update only the stat elements without full re-render
            const bsEl = document.getElementById('live-blood-sugar');
            const stepsEl = document.getElementById('live-steps');
            const waterEl = document.getElementById('live-water');
            const adherenceEl = document.getElementById('live-adherence');
            if (bsEl) { bsEl.style.transition = 'opacity 0.3s'; bsEl.style.opacity = '0.5'; setTimeout(() => { bsEl.textContent = state._liveBloodSugar; bsEl.style.opacity = '1'; }, 150); }
            if (stepsEl) { stepsEl.style.transition = 'opacity 0.3s'; stepsEl.style.opacity = '0.5'; setTimeout(() => { stepsEl.textContent = (state._liveSteps / 1000).toFixed(1) + 'k'; stepsEl.style.opacity = '1'; }, 150); }
            if (waterEl) { waterEl.style.transition = 'opacity 0.3s'; waterEl.style.opacity = '0.5'; setTimeout(() => { waterEl.textContent = state._liveWater + 'L'; waterEl.style.opacity = '1'; }, 150); }
            if (adherenceEl) { adherenceEl.style.transition = 'opacity 0.3s'; adherenceEl.style.opacity = '0.5'; setTimeout(() => { adherenceEl.textContent = state._liveAdherence + '%'; adherenceEl.style.opacity = '1'; }, 150); }
        }, 3000);

        window.navigateTo = navigateTo;
        window.navigateRoleScreen = navigateRoleScreen;
        window.switchRole = switchRole;
        window.selectDay = selectDay;
        window.setPlannerView = setPlannerView;
        window.toggleOnboarding = toggleOnboarding;
        window.nextOnboarding = nextOnboarding;
        window.openSpecialistAction = openSpecialistAction;
        window.saveSpecialistProfile = saveSpecialistProfile;
        window.saveSpecialistAvailability = saveSpecialistAvailability;
        window.sendSpecialistRecommendation = sendSpecialistRecommendation;
        window.saveSpecialistPlan = saveSpecialistPlan;
        window.completeSpecialistTask = completeSpecialistTask;
        window.openMeal = openMeal;
        window.closeMealModal = closeMealModal;
        window.closeModal = closeModal;
        window.toggleGrocery = toggleGrocery;
        window.checkAllGroceries = checkAllGroceries;
        window.simulateOrder = simulateOrder;
        window.simulateChat = simulateChat;
        window.sendChatMessage = sendChatMessage;
        window.resetPrototype = resetPrototype;
    </script>
</body>

</html>
